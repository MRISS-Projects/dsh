name: Wiki Sync

on:
  schedule:
    # Run daily at 02:00 UTC so docs/wiki stays fresh
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # When the cron fires from the default branch (master), re-trigger this
  # workflow on develop so the develop version of the yml is always used.
  redispatch:
    name: Re-dispatch on develop
    if: github.ref != 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger wiki-sync on develop branch
        run: |
          gh workflow run wiki-sync.yml \
            --repo "${{ github.repository }}" \
            --ref develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-wiki:
    name: Sync Wiki Pages to docs/wiki
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: develop

      - name: Clone wiki repository
        run: |
          git clone --depth=1 \
            "https://github.com/${{ github.repository }}.wiki.git" \
            /tmp/wiki

      - name: Copy wiki pages to docs/wiki
        run: |
          mkdir -p docs/wiki
          if [ ! -d /tmp/wiki ] || [ -z "$(find /tmp/wiki -maxdepth 1 -name '*.md' 2>/dev/null)" ]; then
            echo "No wiki pages found – skipping copy."
            exit 0
          fi
          # Copy all Markdown files from the wiki
          find /tmp/wiki -maxdepth 1 -name '*.md' | while read -r src; do
            filename=$(basename "$src")
            dest="docs/wiki/${filename}"
            # Prepend a warning header so editors know not to edit the copy directly
            {
              printf '<!-- AUTO-GENERATED: do not edit directly. '
              printf 'Source: https://github.com/%s/wiki/%s -->\n' \
                "${{ github.repository }}" "${filename%.md}"
              cat "$src"
            } > "$dest"
          done
          echo "Wiki pages copied:"
          ls -1 docs/wiki/*.md 2>/dev/null || echo "(none found)"

      - name: Create pull request with synced wiki pages
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: sync wiki pages to docs/wiki [skip ci]"
          branch: wiki-sync/docs-wiki
          delete-branch: true
          title: "docs: sync wiki pages to docs/wiki"
          body: |
            Automated wiki sync — copies the latest wiki Markdown pages into `docs/wiki/`.

            This PR was opened automatically by the **Wiki Sync** workflow.
          base: develop
          add-paths: 'docs/wiki/**'
