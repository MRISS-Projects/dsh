# MongoDB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=dsh

# Actuator – expose health endpoint
management.endpoints.web.exposure.include=health,info

# Disable Solr health check (Solr may not be available in all environments)
management.health.solr.enabled=false

# Springfox 3.0.0 compatibility with Spring Boot 2.6+ (changed default path-matching strategy)
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
