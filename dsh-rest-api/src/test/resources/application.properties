# MongoDB (test – no real instance)
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=dsh

# Actuator
management.endpoints.web.exposure.include=health,info
management.health.solr.enabled=false

# Springfox 3.0.0 compatibility with Spring Boot 2.6+
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Required to allow WebMvcRequestHandlerProvider override in SwaggerConfig
spring.main.allow-bean-definition-overriding=true

# Disable MongoDB auto-configuration completely in tests so no real
# connection is attempted (beans are replaced by @MockBean)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration


